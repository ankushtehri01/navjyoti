# Nav Jyoti — full stack (MongoDB + API + web).
# Copy .env.example → .env and set real secrets before `docker compose up -d --build`.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [navjyoti]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      MONGO_URI: mongodb://mongo:27017/navjyoti
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      # Local compose runs over plain HTTP → don't require Secure cookies.
      # In real HTTPS production, remove these two lines.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@navjyoti.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
    networks: [navjyoti]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - '${WEB_PORT:-80}:80'
    networks: [navjyoti]

volumes:
  mongo_data:

networks:
  navjyoti:
    driver: bridge
